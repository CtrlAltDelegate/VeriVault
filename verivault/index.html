<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriVault - AI Security Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .shield-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .file-upload {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .file-upload:hover {
            background: #f0f2ff;
        }

        .file-upload input {
            display: none;
        }

        .generate-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.3);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .report-section {
            grid-column: 1 / -1;
        }

        .report-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            white-space: pre-wrap;
            line-height: 1.6;
            font-family: 'Courier New', monospace;
            max-height: 600px;
            overflow-y: auto;
        }

        .download-btn {
            background: linear-gradient(45deg, #2196F3, #1976D2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.3);
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-secure {
            background: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .card {
                padding: 20px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="shield-icon">🛡️</div>
                <div>
                    <h1>VeriVault</h1>
                    <div class="subtitle">AI-Powered Security Management System</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2><span class="status-indicator status-secure"></span>Report Configuration</h2>
                
                <div class="form-group">
                    <label for="apiKey">OpenAI API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-..." />
                </div>

                <div class="form-group">
                    <label for="clientName">Client Name</label>
                    <input type="text" id="clientName" placeholder="Enter client name" />
                </div>

                <div class="form-group">
                    <label for="reportDate">Report Date</label>
                    <input type="date" id="reportDate" />
                </div>

                <div class="form-group">
                    <label for="reportType">Report Type</label>
                    <select id="reportType">
                        <option value="daily">Daily Summary</option>
                        <option value="incident">Incident Report</option>
                        <option value="weekly">Weekly Summary</option>
                        <option value="monthly">Monthly Overview</option>
                    </select>
                </div>

                <button class="generate-btn" id="generateBtn">
                    🔒 Generate Professional Report
                </button>
            </div>

            <div class="card">
                <h2>📋 Security Log Input</h2>
                
                <div class="form-group">
                    <label for="securityLog">Security Notes & Observations</label>
                    <textarea id="securityLog" placeholder="Enter security observations, incidents, patrol notes, access logs, etc.

Example:
- 08:00: Morning perimeter check completed
- 09:30: Client departure to office location
- 10:15: Visitor access granted to John Smith
- 12:00: Lunch security detail activated
- 14:30: Package delivery screened and cleared
- 16:45: Client return to residence
- 18:00: Evening security protocols initiated"></textarea>
                </div>

                <div class="form-group">
                    <label>Or Upload Security Log File</label>
                    <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" accept=".txt,.log,.csv" />
                        <div>📎 Click to upload security log file</div>
                        <small>Supports .txt, .log, .csv files</small>
                    </div>
                </div>
            </div>

            <div class="card report-section hidden" id="reportSection">
                <h2>📊 Generated Security Report</h2>
                <div class="report-content" id="reportContent"></div>
                <button class="download-btn" id="downloadBtn">📥 Download PDF Report</button>
            </div>
        </div>
    </div>

    <script></script>
    <script>
        // Set today's date by default
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

        // File upload handling
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('securityLog').value = e.target.result;
                };
                reader.readAsText(file);
            }
        });

        // Generate report with DIRECT OpenAI API
        document.getElementById('generateBtn').addEventListener('click', async function() {
            const apiKey = document.getElementById('apiKey').value;
            const clientName = document.getElementById('clientName').value;
            const reportDate = document.getElementById('reportDate').value;
            const reportType = document.getElementById('reportType').value;
            const securityLog = document.getElementById('securityLog').value;

            // Basic validation
            if (!apiKey || !clientName || !reportDate || !securityLog) {
                alert('Please fill in all required fields');
                return;
            }

            const generateBtn = document.getElementById('generateBtn');
            const originalButtonText = generateBtn.innerHTML;
            
            // Show loading state
            generateBtn.disabled = true;
            generateBtn.innerHTML = '🔄 Generating AI Report...';

            try {
                const reportTypePrompts = {
                    'daily': 'a comprehensive daily security summary',
                    'incident': 'a detailed security incident report',
                    'weekly': 'a thorough weekly security summary',
                    'monthly': 'a complete monthly security overview'
                };

                const prompt = `You are a professional security report writer for high-net-worth individuals and their security teams. 

Create ${reportTypePrompts[reportType]} based on the following security log data:

CLIENT: ${clientName}
DATE: ${reportDate}
RAW SECURITY LOG:
${securityLog}

Requirements:
- Use professional, formal language appropriate for executive protection
- Include an executive summary highlighting key points
- Format the operational log in a clear, chronological manner
- Assess overall security status and any concerns
- Provide actionable recommendations
- Include appropriate security terminology
- Keep the tone authoritative but not alarmist
- Structure it as a formal security document

Format the report with clear sections and professional presentation.`;

                // Call OpenAI API directly from browser
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are an expert security professional who writes detailed, professional security reports for high-net-worth clients. Your reports are thorough, well-structured, and use appropriate security industry terminology.'
                            },
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        max_tokens: 2000,
                        temperature: 0.3
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`OpenAI API Error: ${errorData.error?.message || 'Unknown error'}`);
                }

                const data = await response.json();
                const aiReport = data.choices[0].message.content;

                // Add VeriVault footer
                const finalReport = `${aiReport}

═══════════════════════════════════════════════════════════════

DOCUMENT AUTHENTICATION
Report Generated: ${new Date().toLocaleString()}
Generated by: VeriVault AI Security Management System
Report ID: VV-${Date.now()}
Digital Signature: [AI-VERIFIED]

This report contains confidential and proprietary information.
Distribution is restricted to authorized personnel only.

═══════════════════════════════════════════════════════════════`;

                displayReport(finalReport);

            } catch (error) {
                console.error('Error:', error);
                alert('Error generating report: ' + error.message);
            } finally {
                // Re-enable button
                generateBtn.disabled = false;
                generateBtn.innerHTML = originalButtonText;
            }
        });

        function displayReport(report) {
            document.getElementById('reportContent').textContent = report;
            document.getElementById('reportSection').classList.remove('hidden');
            document.getElementById('reportSection').scrollIntoView({ behavior: 'smooth' });
        }

       // Download PDF functionality
document.getElementById('downloadBtn').addEventListener('click', async function() {
    const reportContent = document.getElementById('reportContent').textContent;
    
    try {
        const response = await fetch('/.netlify/functions/generate_pdf', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ content: reportContent })
        });
        
        console.log('Function response status:', response.status);
        
        if (response.ok) {
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `VeriVault-Report-${new Date().toISOString().split('T')[0]}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } else {
            console.error('PDF generation failed:', response.status);
            // Fallback to text file
            const blob = new Blob([reportContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `VeriVault-Report-${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    } catch (error) {
        console.error('Error calling PDF function:', error);
        // Fallback to text file
        const blob = new Blob([reportContent], { type: 'text/plain' });
        const url = URL.createObjectURL(url);
        const a = document.createElement('a');
        a.href = url;
        a.download = `VeriVault-Report-${new Date().toISOString().split('T')[0]}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
});
    </script>
</body>
</html>
