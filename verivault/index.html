<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriVault - Debug Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">VeriVault Dashboard - Debug Test</h1>
        
        <div class="space-y-4">
            <button id="testBtn" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded">
                Test Button
            </button>
            
            <div id="output" class="p-4 bg-slate-800 rounded min-h-20">
                <p>Output will appear here...</p>
            </div>
            
            <div class="space-y-2">
                <h3 class="text-lg font-semibold">Test Sidebar Items:</h3>
                <div class="space-y-1">
                    <div class="sidebar-item bg-slate-700 p-2 rounded cursor-pointer hover:bg-slate-600" data-report="daily-log">
                        Daily Log
                    </div>
                    <div class="sidebar-item bg-slate-700 p-2 rounded cursor-pointer hover:bg-slate-600" data-report="incident-medical">
                        Medical Incident
                    </div>
                    <div class="sidebar-item bg-slate-700 p-2 rounded cursor-pointer hover:bg-slate-600" data-report="security-incident">
                        Security Incident
                    </div>
                </div>
            </div>
            
            <div class="space-y-2">
                <h3 class="text-lg font-semibold">Test File Upload:</h3>
                <div id="dropZone" class="border-2 border-dashed border-slate-600 p-6 rounded cursor-pointer hover:border-blue-500">
                    Click here to test file upload
                </div>
                <input type="file" id="csvInput" style="display: none;">
            </div>
        </div>
    </div>

    <script>
        console.log('=== SCRIPT STARTING ===');
        
        function updateOutput(message) {
            var output = document.getElementById('output');
            if (output) {
                output.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + message + '</div>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('=== DOM LOADED ===');
            updateOutput('DOM Loaded Successfully');
            
            // Test basic button
            var testBtn = document.getElementById('testBtn');
            if (testBtn) {
                testBtn.addEventListener('click', function() {
                    console.log('=== TEST BUTTON CLICKED ===');
                    updateOutput('Test button clicked!');
                });
                updateOutput('Test button event listener added');
            }
            
            // Test sidebar items
            var sidebarItems = document.querySelectorAll('.sidebar-item');
            console.log('Found sidebar items:', sidebarItems.length);
            updateOutput('Found ' + sidebarItems.length + ' sidebar items');
            
            for (var i = 0; i < sidebarItems.length; i++) {
                sidebarItems[i].addEventListener('click', function() {
                    var reportType = this.getAttribute('data-report');
                    console.log('=== SIDEBAR CLICKED ===', reportType);
                    updateOutput('Sidebar clicked: ' + reportType);
                    
                    // Remove active class from all
                    for (var j = 0; j < sidebarItems.length; j++) {
                        sidebarItems[j].classList.remove('bg-blue-600');
                        sidebarItems[j].classList.add('bg-slate-700');
                    }
                    
                    // Add active class to clicked item
                    this.classList.remove('bg-slate-700');
                    this.classList.add('bg-blue-600');
                });
            }
            updateOutput('Sidebar event listeners added');
            
            // Test file upload
            var dropZone = document.getElementById('dropZone');
            var csvInput = document.getElementById('csvInput');
            
            if (dropZone && csvInput) {
                dropZone.addEventListener('click', function() {
                    console.log('=== DROP ZONE CLICKED ===');
                    updateOutput('Drop zone clicked - opening file dialog');
                    csvInput.click();
                });
                
                csvInput.addEventListener('change', function(e) {
                    console.log('=== FILE SELECTED ===');
                    if (e.target.files.length > 0) {
                        var file = e.target.files[0];
                        updateOutput('File selected: ' + file.name + ' (' + file.size + ' bytes)');
                    }
                });
                
                updateOutput('File upload event listeners added');
            }
            
            console.log('=== INITIALIZATION COMPLETE ===');
            updateOutput('All event listeners attached successfully!');
        });
        
        console.log('=== SCRIPT LOADED ===');
    </script>
</body>
</html>
